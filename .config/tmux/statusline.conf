# vim: ft=tmux
# Catppuccin Mocha

set -g mode-style "fg=#cdd6f4,bg=#313244"
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#cdd6f4,bg=#313244"

set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#cdd6f4,bg=#1e1e2e"
set -g status-bg "#1e1e2e"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#313244,nobold,nounderscore,noitalics]#[fg=#cdd6f4,bg=#313244,bold] #(whoami) #[fg=#313244,bg=#1e1e2e]"
set -g status-right "#[fg=#313244,bg=#1e1e2e]#[fg=#cdd6f4,bg=#313244] %H:%M #[fg=#45475a,bg=#313244,nobold,nounderscore,noitalics]#[fg=#1e1e2e,bg=#89b4fa,bold] #h "

setw -g window-status-activity-style "underscore,fg=#bac2de,bg=#1e1e2e"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#bac2de,bg=#1e1e2e"
setw -g window-status-format '#[fg=#1e1e2e,bg=#1e1e2e]#[default] #I  #{b:pane_current_path} #[fg=#1e1e2e,bg=#1e1e2e,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#1e1e2e,bg=#313244]#[fg=#89b4fa,bg=#313244] #I #[fg=#313244,bg=#89b4fa] #{b:pane_current_path} #[fg=#89b4fa,bg=#1e1e2e,nobold]'
